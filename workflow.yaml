# webp icon workflow — machine-parseable
flow:
  - install: |
      Namespace tools under $CURTOOLS/logo/ (same layout as repo bin/): rsync -a --delete bin/ "$CURTOOLS/logo/"
      Venv: $CURTOOLS/logo/.venv (venv.zsh or auto on --domain). Python deps only beside logo.sh + system python3.
      From a project checkout that has webp/, export LOGO="$PWD" so outputs go there (your shell can set this when webp/ exists).
      Example: logo () { [[ -d "$PWD/webp" ]] && export LOGO="$PWD"; "$CURTOOLS/logo/logo.sh" "$@" }
  - copy: "<repo>/webp/"
    note: "logo defaults to REPO_ROOT/webp; with $CURTOOLS/logo/ scripts, set LOGO to the checkout (see install example)"
  - run: "logo <file>  OR  logo <dir> (batch, parallel); default size 1024"
  - commit: "pre-commit blocks unless normalized"

normalized:
  path: "webp/<name>.webp"
  size: 1024x1024
  format: webp
  metadata: stripped

hook:
  allow: ["webp/**/*.webp @ 1024x1024", "non-image files in root"]
  block: ["webp/**/*.{png,icns,...}", "root images", "webp/**/*.webp !1024x1024"]
  on_allow: "strip metadata"

layout:
  root: "config, docs, bin, hooks"
  bin: "repo bin/* → install copy at $CURTOOLS/logo/* (flat mirror); .venv lives in logo/"
  webp: "icons + source images; use subdirs for namespaces (e.g. webp/aws/, webp/macos/)"

related_workflows:
  - "workflows/clip-queue.yaml (operation profile for --clip-queue tuning/reruns)"
  - "workflows/logo-fetch-phash-pipeline.yaml (planned domain logo-fetch + pHash pipeline)"
